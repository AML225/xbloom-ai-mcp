services:
  xbloom-mcp:
    image: ghcr.io/aml225/xbloom-ai-mcp:latest
    container_name: xbloom-mcp
    restart: unless-stopped
    volumes:
      - /path/to/xbloom-data:/app/data:rw
    environment:
      - XBLOOM_EMAIL=${XBLOOM_EMAIL}
      - XBLOOM_PASSWORD=${XBLOOM_PASSWORD}
      - MCP_BASE_URL=${MCP_BASE_URL}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
    env_file:
      - .env